name: zizmor

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  scan-actions:
    name: Scan GitHub Actions
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@v0.5.3
